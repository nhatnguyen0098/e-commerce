receivers:
  otlp:
    protocols:
      grpc:
      http:
  prometheus/self:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 15s
          static_configs:
            - targets: ['127.0.0.1:8888']

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  debug:
    verbosity: normal
  otlphttp/grafana_traces:
    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    auth:
      authenticator: basicauth/grafana_cloud
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 8
      queue_size: 4096
  prometheusremotewrite/grafana_metrics:
    endpoint: ${env:GRAFANA_CLOUD_PROM_REMOTE_WRITE_ENDPOINT}
    auth:
      authenticator: basicauth/grafana_cloud
    remote_write_queue:
      enabled: true
      queue_size: 10000
      num_consumers: 8
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
  loki/grafana_logs:
    endpoint: ${env:GRAFANA_CLOUD_LOKI_ENDPOINT}
    auth:
      authenticator: basicauth/grafana_cloud
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 8
      queue_size: 4096

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  basicauth/grafana_cloud:
    client_auth:
      username: ${env:GRAFANA_CLOUD_USER_ID}
      password: ${env:GRAFANA_CLOUD_API_KEY}

service:
  extensions: [health_check, basicauth/grafana_cloud]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/grafana_traces, debug]
    metrics:
      receivers: [otlp, prometheus/self]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite/grafana_metrics, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [loki/grafana_logs, debug]
