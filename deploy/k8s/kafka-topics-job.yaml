apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: e-commerce
spec:
  backoffLimit: 8
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done
      containers:
        - name: create-topics
          image: confluentinc/cp-kafka:7.6.1
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              BOOTSTRAP=kafka:9092
              create_pair() {
                local t="$1"
                kafka-topics --bootstrap-server "$BOOTSTRAP" --create --if-not-exists --topic "$t" --partitions 3 --replication-factor 1
                kafka-topics --bootstrap-server "$BOOTSTRAP" --create --if-not-exists --topic "${t}.reply" --partitions 3 --replication-factor 1
              }
              for t in \
                catalog-list-categories catalog-list-brands catalog-list-products catalog-get-product-by-slug catalog-validate-checkout-lines \
                auth-register auth-login auth-logout \
                get-user-by-id user-check-exists user-create user-get-by-email user-get-by-phone user-update \
                orders-admin-test orders-checkout orders-list-mine orders-get-mine-by-id \
                payments-create-for-order payments-list-by-order-id; do
                create_pair "$t"
              done
              echo "Kafka topics ready."
